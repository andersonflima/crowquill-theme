# Crowquill Ink — tmux theme (monochrome / grayscale)
# Source from your tmux.conf with:
#   source /path/to/terminal/tmux/crowquill-ink.conf

# Status bar base
set -g status-style "bg=#0A0A0A,fg=#8C8C8C"

# Left / right status
set -g status-left-style "bg=#0A0A0A,fg=#8C8C8C"
set -g status-right-style "bg=#0A0A0A,fg=#8C8C8C"

# Windows: inactive
setw -g window-status-style "bg=#0A0A0A,fg=#6A6A6A"
setw -g window-status-format " #I:#W "

# Windows: active
setw -g window-status-current-style "bg=#0A0A0A,fg=#FFFFFF,bold"
setw -g window-status-current-format " #I:#W "

# Window activity / bell
setw -g window-status-activity-style "bg=#0A0A0A,fg=#B8B8B8"
setw -g window-status-bell-style "bg=#0A0A0A,fg=#FFFFFF,bold"

# Pane borders
set -g pane-border-style "fg=#2A2A2A"
set -g pane-active-border-style "fg=#8C8C8C"

# Messages / command prompt
set -g message-style "bg=#2A2A2A,fg=#FFFFFF"
set -g message-command-style "bg=#2A2A2A,fg=#FFFFFF"

# Mode (copy mode) selection
setw -g mode-style "bg=#2A2A2A,fg=#FFFFFF"

# Clock
setw -g clock-mode-colour "#8C8C8C"
