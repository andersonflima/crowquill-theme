# Crowquill Ink — Ghostty color theme (monochrome / grayscale)
# Include from your Ghostty config with:
#   config-file = /path/to/terminal/ghostty/crowquill-ink.conf
# Colors only; no font settings.

background = 0A0A0A
foreground = B8B8B8
cursor-color = FFFFFF
selection-background = 2A2A2A
selection-foreground = FFFFFF

palette = 0=#6A6A6A
palette = 1=#6A6A6A
palette = 2=#8C8C8C
palette = 3=#B8B8B8
palette = 4=#C6C6C6
palette = 5=#B4B4B4
palette = 6=#D2D2D2
palette = 7=#C6C6C6
palette = 8=#4A4A4A
palette = 9=#8C8C8C
palette = 10=#B8B8B8
palette = 11=#C6C6C6
palette = 12=#E4E4E4
palette = 13=#D2D2D2
palette = 14=#EAEAEA
palette = 15=#FFFFFF
